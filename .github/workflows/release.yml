# Build HexCast for macOS + Windows and publish a GitHub Release.
# Trigger: push a tag like v0.2.0  ->  git tag v0.2.0 && git push origin v0.2.0
#
# Both jobs drive the same cross-platform desktop/hexcast.spec (mac reuses
# build-dmg.sh, which calls the spec; Windows calls pyinstaller hexcast.spec
# directly). The spec bundles the WebView2 (edgechromium/winforms) backend and
# a .ico on Windows. The WebView2 runtime ships on Win10/11 for pywebview.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the Release

jobs:
  mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install ffmpeg
        run: brew install ffmpeg
      - name: Build editor
        run: cd editor && npm ci && npm run build
      - name: Build DMG
        run: cd desktop && PYTHON=python3.12 ./build-dmg.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/HexCast.dmg
          fail_on_unmatched_files: true

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Build editor
        run: cd editor && npm ci && npm run build
      - name: Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller "pywebview>=5.0" "pythonnet>=3.0"
          pip install -r requirements.txt
      - name: Fetch ffmpeg
        shell: bash
        run: |
          mkdir -p desktop/bin
          curl -L -o ff.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          unzip -q ff.zip -d ff && cp ff/*/bin/ffmpeg.exe desktop/bin/ffmpeg.exe
      - name: Build (PyInstaller via spec)
        working-directory: desktop
        # hexcast.spec is cross-platform: on Windows it bundles the WebView2
        # (edgechromium/winforms) backend, the .ico, and the desktop/bin ffmpeg.
        run: pyinstaller --noconfirm hexcast.spec
      - name: Zip onedir -> HexCast-Windows.zip
        shell: bash
        working-directory: desktop/dist
        run: 7z a HexCast-Windows.zip HexCast
      - uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/HexCast-Windows.zip
          fail_on_unmatched_files: true
